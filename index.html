<meta name="google" content="notranslate">

<style>.notranslate, body { -webkit-user-select: auto; }</style>
<script>
  // Aggressively block Google Translate
  (function() {
    // Remove google translate script if added
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        mutation.addedNodes.forEach(function(node) {
          if (node.tagName === 'SCRIPT' && node.src && node.src.indexOf('translate.google') !== -1) {
            node.parentNode.removeChild(node);
          }
        });
      });
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    // Override Google Translate init
    window.google = window.google || {};
    window.google.translate = { TranslateElement: function() {} };
  })();
</script>

<style>
* { box-sizing: border-box; }

/* ===== LANGUAGE PANEL ===== */
#lang-btn {
  position: fixed;
  top: 14px;
  right: 130px;
  z-index: 1000;
  background: none;
  border: 1.5px solid #d1d5db;
  border-radius: 22px;
  padding: 7px 14px;
  font-size: 14px;
  cursor: pointer;
  color: #374151;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s, border-color 0.2s;
  white-space: nowrap;
}
#lang-btn:hover { background: #f3f4f6; border-color: #9ca3af; }

#lang-panel {
  position: fixed;
  top: 54px;
  right: 110px;
  z-index: 1001;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.16);
  border: 1px solid #e5e7eb;
  min-width: 200px;
  padding: 8px 0;
  display: none;
  flex-direction: column;
  animation: dropIn 0.18s cubic-bezier(0.4,0,0.2,1);
}
#lang-panel.open { display: flex; }
#lang-panel-title {
  font-size: 11px;
  color: #9ca3af;
  font-weight: bold;
  padding: 4px 16px 8px 16px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid #f3f4f6;
  margin-bottom: 4px;
}
.lang-panel-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 16px;
  cursor: pointer;
  font-size: 13px;
  color: #374151;
  transition: background 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.lang-panel-option:hover { background: #f3f4f6; }
.lang-panel-option.active { color: #2563eb; font-weight: bold; background: #eff6ff; }
.lang-panel-option .lp-check { visibility: hidden; font-size: 13px; }
.lang-panel-option.active .lp-check { visibility: visible; }

body.search-active #lang-btn { opacity: 0; pointer-events: none; }

body{font-family:Arial,sans-serif;background:#fff;color:#111827;text-align:center;padding:40px 20px;margin:0}
.container{max-width:900px;margin:auto;position:relative}

.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 80px;
}
.hero h1 {
  color: #2563eb;
  margin: 0 0 8px 0;
  font-size: 2rem;
}
.hero p {
  margin: 0 0 0 0;
  color: #555;
  font-size: 15px;
}
.hero input {
  width: 40%;
  max-width: 420px;
  min-width: 260px;
  padding: 16px 22px;
  font-size: 18px;
  border-radius: 40px;
  border: 1px solid #d1d5db;
  outline: none;
  margin-top: 25px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.hero input:focus {
  border-color: #2563eb;
  box-shadow: 0 6px 18px rgba(37,99,235,0.25);
}
.hero.animate-ready {
  transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}
.hero.animate-ready h1 {
  transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}
.hero.animate-ready p {
  transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}
.hero.animate-ready input {
  transition: border-color 0.2s, box-shadow 0.2s, margin 0.55s cubic-bezier(0.4,0,0.2,1), width 0.55s, padding 0.55s, font-size 0.55s;
}
.hero.searched {
  flex-direction: row;
  align-items: center;
  padding-top: 0;
  padding: 14px 0;
  gap: 14px;
  border-bottom: 1px solid #e5e7eb;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 200;
}
.hero.searched h1 {
  font-size: 1.25rem;
  white-space: nowrap;
  margin: 0;
}
.hero.searched p {
  display: none;
}
.hero.searched input {
  margin-top: 0;
  width: 100%;
  max-width: 560px;
  font-size: 16px;
  padding: 12px 18px;
}
@media (max-width:600px){
  .hero input{width:85%}
  .hero.searched input{width:100%; min-width: unset}
  .hero.searched h1{font-size:1rem}
}

#suggestions{position:fixed;background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,0.12);text-align:left;z-index:9999;display:none;min-width:260px;max-width:420px;max-height:60vh;overflow-y:auto}
.sug{padding:12px 18px;cursor:pointer;border-bottom:1px solid #eee}
.sug:hover{background:#f3f4f6}
#results{margin-top:16px;text-align:left}
.card{background:transparent;padding:0 0 24px 0;border-radius:0;margin-bottom:0;box-shadow:none;border:none}
.card-src{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.card-fav{width:18px;height:18px;border-radius:4px;background:#e8eaed;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;overflow:hidden}
.card-fav img{width:100%;height:100%;object-fit:contain;border-radius:3px}
.card-domain{font-size:13px;color:#4d5156;line-height:1.4}
.card h3{margin:3px 0 5px 0;font-size:20px;font-weight:400;color:#1a0dab;line-height:1.3}
.card-snip{font-size:14px;color:#4d5156;line-height:1.58;margin:0}
.card-snip b{font-weight:700;color:#202124}

/* ===== IMAGE GRID ===== */
.imggrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
@media(max-width:900px){.imggrid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:650px){.imggrid{grid-template-columns:repeat(2,1fr);}}
.imggrid img{
  width:100%;height:150px;object-fit:cover;
  border-radius:10px 10px 0 0;
  box-shadow:none;
  cursor:pointer;
  transition:transform 0.2s;
  display:block;
  background:#e5e7eb;
}
.imggrid img:hover{transform:scale(1.03);}
.img-source-badge{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;
  margin-bottom:8px;font-weight:bold;color:#fff;
}
.badge-wiki{background:#3366cc;}
.badge-archive{background:#b5451b;}
.badge-unsplash{background:#111111;}
.img-item{
  display:flex;flex-direction:column;align-items:stretch;
  border-radius:10px;overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  transition:box-shadow 0.2s,transform 0.2s;
  background:#f9fafb;
  border:1px solid #e5e7eb;
}
.img-item:hover{box-shadow:0 8px 20px rgba(0,0,0,0.15);transform:translateY(-2px);}
.img-item.img-hidden{display:none !important;}
.img-caption{
  font-size:11px;color:#374151;padding:6px 8px;
  background:#f9fafb;border-top:1px solid #e5e7eb;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.4;
}
.img-caption a{color:#6b7280;font-size:10px;font-weight:normal;text-decoration:none;}
.img-caption a:hover{color:#2563eb;}
@media (max-width:600px){
  .imggrid img{height:120px;}
}

.videos{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.thumb{width:260px;border-radius:12px;overflow:hidden;cursor:pointer;background:#000;transition:transform 0.2s;position:relative}
.thumb:hover{transform:scale(1.03)}
.thumb img{width:100%;display:block}
.thumb p{background:#111;color:#fff;margin:0;padding:8px;font-size:14px}
.play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:50px;height:50px;background:rgba(255,0,0,0.88);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;pointer-events:none}
.reels{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.reel{width:260px;border-radius:12px;overflow:hidden;cursor:pointer;background:#000;position:relative;border:2px solid #E4405F}
.reel img{width:100%;display:block;height:300px;object-fit:cover}
.reel-icon{position:absolute;top:8px;right:8px;background:#E4405F;color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:bold}
.reel p{background:#000;color:#fff;margin:0;padding:8px;font-size:14px;max-height:50px;overflow:hidden}
.player{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:999}
.player iframe{width:90%;max-width:1000px;height:55vw;max-height:560px;border:0;display:none}
.close{position:absolute;top:25px;right:35px;font-size:34px;color:#fff;cursor:pointer}
.loader{position:absolute;width:70px;height:70px;border:7px solid rgba(255,255,255,0.25);border-top:7px solid #2563eb;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.viewer{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:9999;}
.viewer img{max-width:92%;max-height:92%;border-radius:10px;box-shadow:0 0 40px rgba(0,0,0,0.6);}
.viewer span{position:absolute;top:25px;right:35px;font-size:36px;color:#fff;cursor:pointer;}
ul{padding-left:18px}
a{color:#2563eb;font-weight:bold;text-decoration:none}
.url-preview{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:15px;margin-bottom:12px;text-align:left;}
.url-preview-img{width:100%;height:200px;object-fit:cover;border-radius:8px;margin-bottom:10px;}
.url-preview h4{margin:8px 0;color:#1d4ed8;font-size:16px;}
.url-preview p{margin:5px 0;color:#666;font-size:14px;}
.url-preview-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:12px;}
#results > * {
  animation: fadeSlideIn 0.4s ease both;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* ===== INTERNET ARCHIVE VIDEO GRID (Page 2) ===== */
.archive-video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 12px;
  width: 100%;
}
@media screen and (max-width: 650px) {
  .archive-video-grid { grid-template-columns: 1fr !important; }
}
.archive-video-thumb {
  border-radius: 10px;
  overflow: hidden;
  background: #111;
  cursor: pointer;
  position: relative;
  border: 1px solid #d1d5db;
  transition: transform 0.2s, box-shadow 0.2s;
}
.archive-video-thumb:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.18);
}
.archive-video-thumb img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  display: block;
  background: #222;
}
@media (max-width: 768px) {
  .archive-video-thumb img { height: 160px; }
}
.archive-video-play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -65%);
  width: 46px; height: 46px;
  background: rgba(181,69,27,0.88);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
  pointer-events: none;
}
.archive-video-title {
  background: #1a1a1a;
  color: #f3f4f6;
  font-size: 12px;
  padding: 7px 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== AUTH BUTTON (top-right) ===== */
#auth-btn {
  position: fixed;
  top: 14px;
  right: 18px;
  z-index: 1000;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 22px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(37,99,235,0.18);
  transition: background 0.2s, opacity 0.2s;
  display: flex;
  align-items: center;
  gap: 7px;
}
#auth-btn:hover { background: #1d4ed8; }

/* Hide sign-in button when search is active */
body.search-active #auth-btn {
  opacity: 0;
  pointer-events: none;
}

/* Hide profile label + avatar when search is active */
body.search-active #auth-user-label {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

/* Hide dropdown when searching */
body.search-active #auth-dropdown {
  display: none !important;
}

/* ===== USER PROFILE (top-right after login) ===== */
#auth-user-label {
  position: fixed;
  top: 10px;
  right: 18px;
  z-index: 1000;
  display: none;
  align-items: center;
  gap: 8px;
  transition: opacity 0.2s;
}

/* Profile avatar circle */
#auth-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid #2563eb;
  object-fit: cover;
  background: #2563eb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  flex-shrink: 0;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
#auth-avatar:hover { box-shadow: 0 0 0 3px rgba(37,99,235,0.3); }
#auth-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

#auth-user-name-text {
  font-size: 13px;
  font-weight: 500;
  color: #3c4043;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== AUTH MODAL ===== */

<!-- ===== AUTH BUTTON (top-right) ===== -->
<button id="auth-btn" onclick="openAuthModal('login')">🔐 Sign In</button>

<!-- Language button removed -->

<!-- User label with avatar (shown when logged in) -->

<script>
const box = document.getElementById("searchBox");
const results = document.getElementById("results");
const sugBox = document.getElementById("suggestions");
const hero = document.getElementById("hero");

// ===== UNSPLASH CONFIG =====("keypress", e => { if(e.key === "Enter") searchAll(); });

box.addEventListener("input", async () => {
  let q = box.value.trim();
  if(q.length < 2){ sugBox.style.display = "none"; return; }
  if(isValidUrl(q)){ sugBox.style.display = "none"; return; }
  try {
    const [wikiResp, arxivResp] = await Promise.all([
      fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&format=json&origin=*&search=${encodeURIComponent(q)}&limit=6`).then(r=>r.json()).catch(()=>null),
      fetch(`https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(q)}&start=0&max_results=4`).then(r=>r.text()).catch(()=>null)
    ]);
    const wikiSugs = wikiResp ? wikiResp[1].slice(0,6) : [];
    let arxivSugs = [];
    if (arxivResp) {
      try {
        const parser = new DOMParser();
        const xml = parser.parseFromString(arxivResp, "application/xml");
        xml.querySelectorAll("entry").forEach(entry => {
          const title = entry.querySelector("title")?.textContent?.trim();
          if (title && title.toLowerCase() !== "error") arxivSugs.push(title);
        });
      } catch(e) {}
    }
    sugBox.innerHTML = "";
    wikiSugs.forEach(s => {
      sugBox.innerHTML += `<div class="sug" onclick="useSuggestion(this.dataset.val)" data-val="${s.replace(/"/g,'&quot;')}">${s}</div>`;
    });
    arxivSugs.slice(0,4).forEach(s => {
      const short = s.length > 75 ? s.slice(0,75)+"..." : s;
      sugBox.innerHTML += `<div class="sug" onclick="useSuggestion(this.dataset.val)" data-val="${s.replace(/"/g,'&quot;')}" style="font-size:13px;color:#374151">${short}</div>`;
    });
    if (!sugBox.innerHTML) { sugBox.style.display = "none"; return; }
    const rect = box.getBoundingClientRect();
    sugBox.style.top = (rect.bottom + 4) + "px";
    sugBox.style.left = rect.left + "px";
    sugBox.style.width = rect.width + "px";
    sugBox.style.display = "block";
  } catch { sugBox.style.display = "none"; }
});

function useSuggestion(text){ box.value = text; sugBox.style.display = "none"; searchAll(); }
document.addEventListener("click", e => { if(!box.contains(e.target)) sugBox.style.display = "none"; });

function activateSearchMode() {
  if (!hero.classList.contains("searched")) {
    hero.classList.add("animate-ready");
    requestAnimationFrame(() => { hero.classList.add("searched"); });
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
  document.body.classList.add("search-active");
}

function isValidUrl(string) {
  const domainPattern = /^(([a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,}|localhost)(:\d+)?([/?#][^\s]*)?$/i;
  if(domainPattern.test(string)) return true;
  try {
    const url = new URL(string);
    return url.protocol === 'http:' || url.protocol === 'https:';
  } catch(_) { return false; }
}

async function fetchUrlMetadata(urlString){
  try {
    const response = await fetch(`https://api.linkpreview.net?key=1234567890&q=${encodeURIComponent(urlString)}`);
    const data = await response.json();
    return data;
  } catch(err) { return null; }
}

function extractDomainInfo(urlString){
  try {
    let fullUrl = urlString;
    if(!urlString.startsWith('http://') && !urlString.startsWith('https://')) {
      fullUrl = 'https://' + urlString;
    }
    const url = new URL(fullUrl);
    return { protocol:url.protocol, hostname:url.hostname, pathname:url.pathname, search:url.search, origin:url.origin, fullUrl:url.href };
  } catch(e) { return null; }
}

function cleanQuery(q){
  q = q.toLowerCase().trim();
  ["what is","who is","define","meaning of","tell me about","information about"]
    .forEach(p => { if(q.startsWith(p)) q = q.replace(p, "").trim(); });
  return q;
}

function getMetalSymbol(q){
  const map = { gold:"OANDA:XAUUSD", silver:"OANDA:XAGUSD", copper:"OANDA:XCUUSD", platinum:"OANDA:XPTUSD", palladium:"OANDA:XPDUSD" };
  return map[q.toLowerCase()] || null;
}

function parseCurrency(query){
  const q = query.toUpperCase().replace(/\s+/g,"");
  if(q.includes("TO")){ const p = q.split("TO"); if(p[0].length===3 && p[1].length===3) return p; }
  if(q.includes("IN")){ const p = q.split("IN"); if(p[0].length===3 && p[1].length===3) return p; }
  return null;
}

function renderChart(title, symbol){
  results.innerHTML = `<div class="card"><h3>📊 ${title} Live Chart</h3>
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&hidesidetoolbar=1"
  style="width:100%;height:400px;border:0;"></iframe></div>`;
}

async function fetchRate(base, quote){
  try {
    const r = await fetch(`https://api.exchangerate.host/convert?from=${base}&to=${quote}`);
    const d = await r.json();
    return d.result;
  } catch { return null; }
}

// ===== UNSPLASH CONFIG =====
const UNSPLASH_ACCESS_KEY = "_mJ6g03PVc9ZV9FkCeE09ZbK9nZtpDUx6PlF4x6RC0A";

// ===== FETCH MIXED IMAGES: Wikipedia + Internet Archive + Unsplash =====
async function fetchMixedImages(query) {
  const [wikiData, archiveData, unsplashData] = await Promise.all([
    fetch(`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrlimit=2&piprop=thumbnail&pithumbsize=700`)
      .then(r => r.json()).catch(() => null),
    fetch(`https://archive.org/advancedsearch.php?q=${encodeURIComponent(query)}+AND+mediatype:(image)&rows=2&output=json&fl[]=identifier,title,description`)
      .then(r => r.json()).catch(() => null),
    fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=4&client_id=${UNSPLASH_ACCESS_KEY}`)
      .then(r => r.json()).catch(() => null)
  ]);

  let images = [];

  // Unsplash images — shown first
  if (unsplashData?.results?.length) {
    unsplashData.results.forEach(photo => {
      images.push({
        src: photo.urls.small,
        fullSrc: photo.urls.regular,
        title: photo.alt_description
          ? photo.alt_description.charAt(0).toUpperCase() + photo.alt_description.slice(1)
          : (photo.description || query),
        credit: photo.user?.name || "",
        creditUrl: photo.user?.links?.html ? photo.user.links.html + "?utm_source=VarunSearch&utm_medium=referral" : "",
        unsplashLink: photo.links?.html ? photo.links.html + "?utm_source=VarunSearch&utm_medium=referral" : "",
        source: 'unsplash'
      });
    });
  }

  if (wikiData?.query?.pages) {
    Object.values(wikiData.query.pages).forEach(p => {
      if (p.thumbnail?.source) {
        images.push({ src: p.thumbnail.source, fullSrc: p.thumbnail.source, title: p.title || query, source: 'wiki' });
      }
    });
  }

  if (archiveData?.response?.docs?.length) {
    archiveData.response.docs.forEach(doc => {
      if (doc.identifier) {
        images.push({
          src: `https://archive.org/services/img/${doc.identifier}`,
          fullSrc: `https://archive.org/services/img/${doc.identifier}`,
          title: doc.title || doc.identifier,
          source: 'archive',
          link: `https://archive.org/details/${doc.identifier}`
        });
      }
    });
  }

  return images.slice(0, 8);
}

async function searchAll(){
  let raw = box.value.trim();
  if(!raw){ results.innerHTML = (_t && _t.searchingText) ? "..." : "Type something"; return; }

  activateSearchMode();

  if(isValidUrl(raw)){ handleUrlSearch(raw); return; }

  let q = cleanQuery(raw);

  const site = detectWebsite(q);
  if(site){
    results.innerHTML = `<div class="card"><h3>🌐 Official Website</h3>
    <a href="${site}" target="_blank" style="font-size:20px;color:#1d4ed8">${site}</a></div>`;
    wikiAndMore(q, true);
    return;
  }
  const _t = TRANSLATIONS[currentLang] || TRANSLATIONS["en"];
  results.innerHTML = _t.searchingText || "Searching...";

  const metal = getMetalSymbol(q);
  if(metal){ renderChart(q, metal); wikiAndMore(q, true); return; }

  const cur = parseCurrency(q);
  if(cur){
    const [b,c] = cur;
    const rate = await fetchRate(b,c);
    renderChart(`${b}/${c}`, `FX:${b}${c}`);
    if(rate) results.innerHTML += `<div class="card"><h3>💱 Rate</h3>1 ${b} = ${rate.toFixed(4)} ${c}</div>`;
    wikiAndMore(q, true);
    return;
  }

  wikiAndMore(q, false);
}

async function handleUrlSearch(urlString){
  const domainInfo = extractDomainInfo(urlString);
  if(!domainInfo){
    results.innerHTML = `<div class="card"><h3>❌ Invalid URL</h3><p>Please enter a valid domain (example.com) or full URL</p></div>`;
    return;
  }
  let html = '';
  const metadata = await fetchUrlMetadata(domainInfo.fullUrl);
  if(metadata && metadata.description){
    html += `<div class="card url-preview">
    ${metadata.image ? `<img src="${metadata.image}" class="url-preview-img" onerror="this.style.display='none'">` : ''}
    <h4>${metadata.title || 'Page Title'}</h4>
    <p>${metadata.description}</p>
    <a href="${domainInfo.fullUrl}" class="url-preview-link" target="_blank">Visit Website →</a></div>`;
  } else {
    html += `<div class="card url-preview">
    <h4>${domainInfo.hostname}</h4>
    <p>Domain loaded successfully</p>
    <a href="${domainInfo.fullUrl}" class="url-preview-link" target="_blank">Visit Website →</a></div>`;
  }
  results.innerHTML = html;
}

async function wikiAndMore(query, prepend){

  let [wiki, related, youtubeData, bookData, dictionary, nyt, mixedImages] = await Promise.all([
    fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${query}`).then(r=>r.json()).catch(()=>null),
    fetch(`https://en.wikipedia.org/api/rest_v1/page/related/${query}`).then(r=>r.json()).catch(()=>null),
    fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query} -porn -sex -xxx -adult&type=video&videoEmbeddable=true&maxResults=6&safeSearch=strict&relevanceLanguage=en&regionCode=IN&key=AIzaSyDyWGI5y-u2W6dOaW3HcR0eya4vKc5RpEc`).then(r=>r.json()).catch(()=>null),
    fetch(`https://archive.org/advancedsearch.php?q=${query}+AND+mediatype:(texts)&rows=6&output=json`).then(r=>r.json()).catch(()=>null),
    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${query}`).then(r=>r.json()).catch(()=>null),
    fetch(`https://api.nytimes.com/svc/search/v2/articlesearch.json?q=${query}&sort=relevance&api-key=CiqtHbbDZBTvwGLOGP5sav9ZAKOXOt7Nvkk6kGA8Pd5GDLOG`).then(r=>r.json()).catch(()=>null),
    fetchMixedImages(query)
  ]);

  let html = prepend ? results.innerHTML : "";

  // ===== 🖼 IMAGES SECTION =====
  if (mixedImages && mixedImages.length > 0) {
    const unsplashCount = mixedImages.filter(i => i.source === 'unsplash').length;
    html += `<div class="card">
      <div class="card-src">
        <div class="card-fav">🖼</div>
        <span class="card-domain">Images${unsplashCount > 0 ? ' · Powered by Unsplash' : ''}</span>
      </div>
      <h3 style="font-size:17px;color:#1a0dab;margin-bottom:10px">Images</h3>
      <div class="imggrid">`;
    mixedImages.forEach(img => {
      const safeTitle = (img.title || '').replace(/'/g, "&#39;").replace(/"/g, '&quot;');
      const safeSrc = (img.fullSrc || img.src).replace(/'/g, "%27");
      let captionHTML = '';
      if (img.source === 'unsplash') {
        captionHTML = `<div class="img-caption">
          📸 ${safeTitle}
          ${img.credit ? `<br><a href="${img.creditUrl || '#'}" target="_blank" rel="noopener">by ${img.credit}</a>` : ''}
        </div>`;
      } else if (img.source === 'wiki') {
        captionHTML = `<div class="img-caption">🔵 ${safeTitle}</div>`;
      } else if (img.source === 'archive') {
        captionHTML = `<div class="img-caption"><a href="${img.link || '#'}" target="_blank" rel="noopener">📦 ${safeTitle}</a></div>`;
      }
      html += `<div class="img-item">
        <img src="${img.src}" title="${safeTitle}" loading="lazy"
             onerror="this.closest('.img-item').classList.add('img-hidden')"
             onclick="openViewer('${safeSrc}')">
        ${captionHTML}
      </div>`;
    });
    html += `</div></div>`;
    // Fix last-row gap after hidden images settle
    setTimeout(() => {
      const grids = document.querySelectorAll('.imggrid');
      grids.forEach(grid => {
        const cols = Math.round(grid.offsetWidth / (grid.querySelector('.img-item')?.offsetWidth || 1));
        const visible = [...grid.querySelectorAll('.img-item:not(.img-hidden)')];
        const rem = visible.length % cols;
        if (rem !== 0) {
          const lastItems = visible.slice(-rem);
          const span = Math.floor(cols / rem);
          lastItems.forEach(el => { el.style.gridColumn = `span ${span}`; });
        }
      });
    }, 800);
  }

  if(wiki?.extract){
    const wikiTitle = wiki.title || query;
    const wikiSlug = wikiTitle.replace(/ /g,'_');
    html += `<div class="card">
      <div class="card-src">
        <div class="card-fav"><img src="https://en.wikipedia.org/favicon.ico" onerror="this.parentElement.textContent='W'"></div>
        <span class="card-domain">en.wikipedia.org › wiki › ${wikiSlug}</span>
      </div>
      <h3><a href="https://en.wikipedia.org/wiki/${wikiSlug}" target="_blank" style="color:#1a0dab;text-decoration:none">${wikiTitle} – Wikipedia</a></h3>
      <p class="card-snip">${wiki.extract.slice(0,300)}${wiki.extract.length>300?'...':''}</p>
    </div>`;
  }

  if(dictionary && Array.isArray(dictionary)){
    let meanings = dictionary[0]?.meanings?.[0]?.definitions?.[0]?.definition;
    let example = dictionary[0]?.meanings?.[0]?.definitions?.[0]?.example;
    if(meanings){
      html += `<div class="card">
        <div class="card-src">
          <div class="card-fav">📖</div>
          <span class="card-domain">dictionaryapi.dev</span>
        </div>
        <h3 style="font-size:18px;color:#1a0dab">${query.charAt(0).toUpperCase()+query.slice(1)}</h3>
        <p class="card-snip"><b>Definition:</b> ${meanings}${example ? ` <b>Example:</b> ${example}` : ''}</p>
      </div>`;
    }
  }

  if(nyt && nyt.response && nyt.response.docs && nyt.response.docs.length > 0){
    let a = nyt.response.docs[0];
    if(a.web_url){
      let title = a.headline?.main || "";
      let url = a.web_url;
      let snippet = a.snippet || "";
      let img = "";
      if(a.multimedia && a.multimedia.length > 0) img = "https://www.nytimes.com/" + a.multimedia[0].url;
      html += `<div class="card">
        <div class="card-src">
          <div class="card-fav"><img src="https://www.nytimes.com/favicon.ico" onerror="this.parentElement.textContent='NYT'"></div>
          <span class="card-domain">nytimes.com</span>
        </div>
        <h3><a href="${url}" target="_blank" style="color:#1a0dab;text-decoration:none">${title}</a></h3>
        ${img ? `<img src="${img}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin:6px 0 8px 0">` : ""}
        <p class="card-snip">${snippet}</p>
      </div>`;
    }
  }

  if(youtubeData?.items?.length){
    const ytCols = window.innerWidth <= 480 ? "1fr" : "repeat(3,1fr)";
    html += `<div class="card">
      <div class="card-src">
        <div class="card-fav"><img src="https://www.youtube.com/favicon.ico" onerror="this.parentElement.textContent='▶'"></div>
        <span class="card-domain">youtube.com › Videos</span>
      </div>
      <h3 style="font-size:17px;color:#1a0dab;margin-bottom:10px">YouTube Videos</h3>
      <div style="display:grid;grid-template-columns:${ytCols};gap:16px;width:100%">` ;
    youtubeData.items.forEach(v => {
      if(v.id.kind !== "youtube#video") return;
      let vid = v.id.videoId;
      let thumb = v.snippet.thumbnails.medium.url;
      let title = v.snippet.title.slice(0,80);
      html += `<div class="archive-video-thumb" onclick="openYT('${vid}')">
        <img src="${thumb}" style="height:150px">
        <div class="archive-video-play">▶</div>
        <div class="archive-video-title" title="${title}">${title}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  if(bookData?.response?.docs?.length){
    html += `<div class="card">
      <div class="card-src">
        <div class="card-fav"><img src="https://archive.org/favicon.ico" onerror="this.parentElement.textContent='📚'"></div>
        <span class="card-domain">archive.org › texts</span>
      </div>
      <h3 style="font-size:17px;color:#1a0dab">Related Books & Texts</h3>`;
    bookData.response.docs.slice(0,5).forEach(b => {
      html += `<div style="margin:4px 0"><a href="https://archive.org/details/${b.identifier}" target="_blank" style="color:#1a0dab;font-size:14px;text-decoration:none">${b.title || b.identifier}</a></div>`;
    });
    html += `</div>`;
  }

  if(related?.pages?.length){
    html += `<div class="card">
      <div class="card-src">
        <div class="card-fav"><img src="https://en.wikipedia.org/favicon.ico" onerror="this.parentElement.textContent='W'"></div>
        <span class="card-domain">en.wikipedia.org › Related Topics</span>
      </div>
      <h3 style="font-size:17px;color:#1a0dab">Related Topics</h3>`;
    related.pages.slice(0,6).forEach(p => {
      html += `<div style="margin:4px 0"><a target="_blank" href="https://en.wikipedia.org/wiki/${p.title}" style="color:#1a0dab;font-size:14px;text-decoration:none">${p.title}</a></div>`;
    });
    html += `</div>`;
  }

  // Add "click to next page" button at bottom of page 1
  html += `<div id="next-page-btn" style="text-align:left;margin:30px 0 10px 0">
    <button onclick="goToPage2()" style="background:none;border:none;font-family:'Courier New',monospace;font-size:17px;color:#2563eb;cursor:pointer;letter-spacing:2px;text-decoration:underline;padding:10px 0">
      click to next page
    </button>
  </div>`;

  results.innerHTML = html || "No result";

  // Store current query for page 2
  window._lastSearchQuery = box.value.trim();
}

  renderPage2(query);
}

function goToPage1() {

  searchAll();
}

async function renderPage2(query) {
  const cleanQ = cleanQuery(query);

  // ===== VarunSearch Knowledge Program — keyword mapping =====
  const vsKnowledgeVideos = [
    {
      keywords: ["adenoid", "adenoids", "adenoid surgery", "adenoidectomy", "tonsil adenoid"],
      file: "adenoidsurgery.mp4",
      title: "Adenoid Surgery – Complete Guide",
      desc: "Everything you need to know about adenoid surgery, symptoms, and recovery."
    }
    // Add more entries here as needed
  ];

  const lowerQ = cleanQ.toLowerCase();
  const matchedVS = vsKnowledgeVideos.find(v => v.keywords.some(k => lowerQ.includes(k)));

  // Show slots immediately, no nav bar
  results.innerHTML = `
    ${matchedVS ? `<div id="p2-vs-knowledge-slot"></div>` : ""}
    <div id="p2-arxiv-slot"></div>
    <div id="p2-archive-video-slot"></div>
    <div style="text-align:left;margin:20px 0">
      <button onclick="goToPage1()" style="background:none;border:none;font-family:'Courier New',monospace;font-size:17px;color:#2563eb;cursor:pointer;letter-spacing:2px;text-decoration:underline;padding:10px 0">
        ← back to page 1
      </button>
    </div>`;

  // ===== Render VarunSearch Knowledge card if matched =====
  if (matchedVS) {
    const vsSlot = document.getElementById("p2-vs-knowledge-slot");
    if (vsSlot) {
      const vidCols = window.innerWidth <= 480 ? "1fr" : "repeat(3,1fr)";
      vsSlot.innerHTML = `<div class="card" id="vs-knowledge-card">
        <h3>🎓 VarunSearch Knowledge Program
          <span style="font-size:12px;font-weight:normal;color:#6b7280;margin-left:8px">Exclusive educational content</span>
        </h3>
        <div class="archive-video-grid" style="grid-template-columns:${vidCols}">
          <div class="archive-video-thumb" onclick="playLocalVideo('${matchedVS.file}')">
            <div style="width:100%;height:150px;background:linear-gradient(135deg,#1e3a8a,#2563eb);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px">
              <div style="font-size:36px">🎬</div>
              <div style="font-size:11px;color:#bfdbfe;font-weight:bold;letter-spacing:1px">VarunSearch</div>
            </div>
            <div class="archive-video-play">▶</div>
            <div class="archive-video-title" title="${matchedVS.title}">${matchedVS.title}</div>
          </div>
        </div>
        <p style="font-size:13px;color:#6b7280;margin:10px 0 0 0">${matchedVS.desc}</p>
      </div>`;
    }
  }

  // Fetch all 3 in parallel, render each as it arrives
  const arxivPromise = fetch(`https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(cleanQ)}&start=0&max_results=5`)
    .then(r => r.text()).catch(() => null);
  const archiveVideoPromise = fetch(`https://archive.org/advancedsearch.php?q=${encodeURIComponent(cleanQ)}+AND+mediatype:(movies)&rows=6&output=json&fl[]=identifier,title,description`)
    .then(r => r.json()).catch(() => null);

  // arXiv
  arxivPromise.then(arxivData => {
    const slot = document.getElementById("p2-arxiv-slot");
    if (!slot) return;
    let items = "";
    if (arxivData) {
      try {
        const parser = new DOMParser();
        const xml = parser.parseFromString(arxivData, "application/xml");
        const entries = xml.querySelectorAll("entry");
        entries.forEach(entry => {
          const title = entry.querySelector("title")?.textContent?.trim() || "Untitled";
          const summary = entry.querySelector("summary")?.textContent?.trim() || "";
          const link = entry.querySelector("link[title='pdf']")?.getAttribute("href") ||
                       entry.querySelector("link")?.getAttribute("href") || "#";
          const published = entry.querySelector("published")?.textContent?.slice(0,10) || "";
          const authors = [...entry.querySelectorAll("author name")].map(a => a.textContent).slice(0,3).join(", ");
          items += `<div style="border-left:3px solid #b91c1c;padding:10px 14px;margin:10px 0;background:#fff7f7;border-radius:0 8px 8px 0">
            <a href="${link}" target="_blank" style="font-weight:bold;color:#b91c1c;font-size:14px">${title}</a>
            <div style="font-size:12px;color:#6b7280;margin:3px 0">${authors}${published ? ` · ${published}` : ''}</div>
            <div style="font-size:13px;color:#374151;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${summary}</div>
          </div>`;
        });
      } catch(e) {}
    }
    if (items) {
      slot.innerHTML = `<div class="card" id="arxiv-card">
        <h3>🔬 arXiv Research Papers</h3>${items}</div>`;
    }
    // if no items, slot stays empty (card hidden)
  });

  // Internet Archive Videos
  archiveVideoPromise.then(archiveVidData => {
    const slot = document.getElementById("p2-archive-video-slot");
    if (!slot) return;
    const docs = archiveVidData?.response?.docs;
    if (!docs || docs.length === 0) return;
    const validDocs = docs.filter(d => d.identifier).slice(0, 3);
    if (validDocs.length === 0) return;
    const vidCols = window.innerWidth <= 480 ? "1fr" : "repeat(3,1fr)";
    let cards = "";
    validDocs.forEach(doc => {
      const id = doc.identifier;
      const title = (doc.title || id).slice(0, 80);
      const thumb = `https://archive.org/services/img/${id}`;
      const videoUrl = `https://archive.org/embed/${id}`;
      cards += `<div class="archive-video-thumb" onclick="playVideo('${videoUrl}')">
        <img src="${thumb}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 320 160\\'%3E%3Crect fill=\\'%23222\\' width=\\'320\\' height=\\'160\\'/%3E%3Ctext x=\\'50%25\\' y=\\'50%25\\' fill=\\'%23888\\' text-anchor=\\'middle\\' dy=\\'.3em\\' font-size=\\'14\\'%3ENo Preview%3C/text%3E%3C/svg%3E'">
        <div class="archive-video-play">▶</div>
        <div class="archive-video-title" title="${title}">${title}</div>
      </div>`;
    });
    slot.innerHTML = `<div class="card" id="archive-video-card">
      <div class="card-src">
        <div class="card-fav"><img src="https://archive.org/favicon.ico" onerror="this.parentElement.textContent='📼'"></div>
        <span class="card-domain">archive.org › Videos</span>
      </div>
      <h3 style="font-size:17px;color:#1a0dab;margin-bottom:10px">Internet Archive Videos</h3>
      <div class="archive-video-grid" style="grid-template-columns:${vidCols}">${cards}</div>
    </div>`;
  });
}

function playLocalVideo(filename){
  player.style.display = "flex";
  loader.style.display = "block";
  frame.style.display = "none";
  frame.src = "";
  // Check if browser supports video in iframe; use video tag instead
  const existing = document.getElementById("local-video-el");
  if (existing) existing.remove();
  const vid = document.createElement("video");
  vid.id = "local-video-el";
  vid.src = filename;
  vid.controls = true;
  vid.autoplay = true;
  vid.style.cssText = "width:90%;max-width:1000px;max-height:560px;border-radius:10px;display:block";
  player.appendChild(vid);
  loader.style.display = "none";
  vid.onloadeddata = () => { loader.style.display = "none"; };
}

function openYT(videoId){
  window.open('https://www.youtube.com/watch?v=' + videoId, '_blank');
}

function playVideo(url){
  player.style.display = "flex";
  loader.style.display = "block";
  frame.style.display = "none";
  frame.src = "";
  setTimeout(() => { frame.src = url; }, 200);
  frame.onload = () => { loader.style.display = "none"; frame.style.display = "block"; };
  setTimeout(() => { if(frame.style.display === "none"){ window.open(url.replace("embed/","watch?v="), "_blank"); } }, 4000);
}
function closeVideo(){
  frame.src = "";
  player.style.display = "none";
  const vid = document.getElementById("local-video-el");
  if (vid) vid.remove();
}

function openViewer(src){
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("viewImg").src = src;
}
function closeViewer(){ document.getElementById("viewer").style.display = "none"; }

function detectWebsite(query){
  const sites = {
    google:"https://www.google.com", youtube:"https://www.youtube.com", wikipedia:"https://www.wikipedia.org",
    facebook:"https://www.facebook.com", instagram:"https://www.instagram.com", twitter:"https://twitter.com",
    github:"https://github.com", stackoverflow:"https://stackoverflow.com", amazon:"https://www.amazon.in",
    flipkart:"https://www.flipkart.com"
  };
  return sites[query.toLowerCase()] || null;
}

function toggleLangPanel() {
  const panel = document.getElementById("lang-panel");
  panel.classList.toggle("open");
}

  document.getElementById("lang-panel").classList.remove("open");
}
document.addEventListener("click", function(e) {
  const panel = document.getElementById("lang-panel");
  const btn = document.getElementById("lang-btn");
  if (panel && btn && !panel.contains(e.target) && !btn.contains(e.target)) {
    closeLangPanel();
  }
});

function setLanguage(code, name) {
  currentLang = code;
  localStorage.setItem("varun_lang", code);
  applyLanguage(code);
  // update active state on dropdown buttons
  document.querySelectorAll(".lang-option").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === code);
  });
  // update active state on panel buttons
  document.querySelectorAll(".lang-panel-option").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === code);
  });
  // update lang button label
  const label = document.getElementById("lang-btn-label");
  if (label) label.textContent = code.toUpperCase();
  closeLangPanel();
  closeAuthDropdown();
}

function applyLanguage(code) {
  const t = TRANSLATIONS[code] || TRANSLATIONS["en"];
  // Direction
  document.documentElement.dir = t.dir;
  document.documentElement.lang = code;

  // Page title (browser tab + bookmarks)
  if (t.pageTitle) document.title = t.pageTitle;

  // Hero
  const h1 = document.querySelector(".hero h1");
  if (h1) h1.textContent = t.siteTitle;
  const heroP = document.querySelector(".hero p");
  if (heroP) heroP.textContent = t.siteSubtitle;
  const searchBox = document.getElementById("searchBox");
  if (searchBox) searchBox.placeholder = t.searchPlaceholder;

  // Auth button
  const authBtn = document.getElementById("auth-btn");
  if (authBtn) authBtn.innerHTML = t.signIn;

  // Sign out button
  const signOutBtn = document.getElementById("auth-signout-btn");
  if (signOutBtn) signOutBtn.textContent = t.signOut;

  // Language section title
  const langTitle = document.getElementById("lang-section-title");
  if (langTitle) langTitle.textContent = t.langSection;

  // Modal texts (update dynamically based on current authMode handled in updateModalText)
  window._currentTranslation = t;
  // Refresh modal text if it's open
  const overlay = document.getElementById("auth-modal-overlay");
  if (overlay && overlay.classList.contains("open")) {
    applyModalTranslation();
  }
}

function applyModalTranslation() {
  const t = window._currentTranslation || TRANSLATIONS["en"];
  const authMode = window._authMode || "login";
  const title = document.getElementById("auth-modal-title");
  const sub = document.getElementById("auth-modal-sub");
  const btn = document.getElementById("auth-submit-btn");
  const toggle = document.getElementById("auth-toggle-text");
  if (authMode === "login") {
    if (title) title.textContent = t.modalWelcome;
    if (sub) sub.textContent = t.modalSub;
    if (btn) btn.textContent = t.modalSignIn;
    if (toggle) toggle.innerHTML = `${t.modalNoAccount} <span onclick="switchAuthMode()">${t.modalSignUp}</span>`;
  } else {
    if (title) title.textContent = t.modalCreate;
    if (sub) sub.textContent = t.modalCreateSub;
    if (btn) btn.textContent = t.modalSignUp;
    if (toggle) toggle.innerHTML = `${t.modalHaveAccount} <span onclick="switchAuthMode()">${t.modalSignIn}</span>`;
  }
}

// Init language on page load
document.addEventListener("DOMContentLoaded", function() {
  applyLanguage(currentLang);
  document.querySelectorAll(".lang-option").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === currentLang);
  });
  document.querySelectorAll(".lang-panel-option").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === currentLang);
  });
  const label = document.getElementById("lang-btn-label");
  if (label) label.textContent = currentLang.toUpperCase();
});
</script>

<!-- ===== FIREBASE AUTH ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    GoogleAuthProvider,
    signInWithPopup
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB7rrqsE_9aGe5ea1BGx380RMwZ1tuxqOw",
    authDomain: "varunsearchweb.firebaseapp.com",
    projectId: "varunsearchweb",
    storageBucket: "varunsearchweb.firebasestorage.app",
    messagingSenderId: "295007343755",
    appId: "1:295007343755:web:2d4c040d425959568e708e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  // ---- UI state ----
  let authMode = "login"; // "login" | "signup"
  window._authMode = authMode;

  function getInitials(user) {
    if (user.displayName) {
      return user.displayName.split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);
    }
    return (user.email[0] || "U").toUpperCase();
  }

  function renderAvatar(container, user) {
    if (user.photoURL) {
      container.innerHTML = `<img src="${user.photoURL}" alt="avatar" onerror="this.parentElement.textContent='${getInitials(user)}'">`;
    } else {
      container.textContent = getInitials(user);
    }
  }

  function setAuthUIForUser(user) {
    const btn = document.getElementById("auth-btn");
    const label = document.getElementById("auth-user-label");
    const nameText = document.getElementById("auth-user-name-text");
    const avatar = document.getElementById("auth-avatar");
    const ddAvatar = document.getElementById("auth-dropdown-avatar");
    const ddName = document.getElementById("auth-dropdown-name");
    const ddEmail = document.getElementById("auth-dropdown-email");

    if (user) {
      btn.style.display = "none";
      label.style.display = "flex";
      const displayName = user.displayName || user.email.split("@")[0];
      nameText.textContent = displayName;
      // Main avatar
      renderAvatar(avatar, user);
      // Dropdown avatar
      renderAvatar(ddAvatar, user);
      ddName.textContent = displayName;
      ddEmail.textContent = user.email;
    } else {
      btn.style.display = "flex";
      label.style.display = "none";
      closeAuthDropdown();
    }
  }

  // Dropdown toggle
  window.toggleAuthDropdown = function() {
    const dd = document.getElementById("auth-dropdown");
    dd.classList.toggle("open");
  };

  window.openIncognitoWindow = function() {
    closeAuthDropdown();
    // Open current page in a new window (browser handles incognito via user's choice)
    // We open a blank page with a message guiding the user
    const url = window.location.href;
    const w = window.open('', '_blank', 'noopener,noreferrer');
    if (w) {
      w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Open Incognito</title>
      <style>body{font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;background:#1e1e2e;color:#fff;text-align:center;gap:16px}
      .icon{font-size:64px}.title{font-size:22px;font-weight:bold}.sub{font-size:14px;color:#aaa;max-width:400px;line-height:1.6}
      .url{background:#2d2d3d;border-radius:8px;padding:10px 20px;font-size:13px;color:#8ab4f8;word-break:break-all;max-width:500px}
      kbd{background:#333;border:1px solid #555;border-radius:4px;padding:2px 7px;font-size:13px}</style></head>
      <body>
        <div class="icon">🕵️</div>
        <div class="title">Open VarunSearch in Incognito</div>
        <div class="sub">Copy the link below and paste it in a new Incognito / Private window.<br>
        <b>Shortcut:</b> <kbd>Ctrl+Shift+N</kbd> (Chrome) &nbsp;|&nbsp; <kbd>Ctrl+Shift+P</kbd> (Firefox)</div>
        <div class="url">${url}</div>
        <button onclick="navigator.clipboard.writeText('${url}').then(()=>{this.textContent='✓ Copied!';setTimeout(()=>this.textContent='Copy Link',2000)})" 
          style="margin-top:8px;padding:10px 28px;background:#1a73e8;color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer;font-weight:bold">Copy Link</button>
      </body></html>`);
      w.document.close();
    }
  };

  window.closeAuthDropdown = function() {
    document.getElementById("auth-dropdown").classList.remove("open");
  };

  // Close dropdown on outside click
  document.addEventListener("click", function(e) {
    const dd = document.getElementById("auth-dropdown");
    const avatar = document.getElementById("auth-avatar");
    if (!dd.contains(e.target) && e.target !== avatar) {
      closeAuthDropdown();
    }
  });

  onAuthStateChanged(auth, (user) => {
    setAuthUIForUser(user);
  });

  // ---- Exposed to global scope ----
  window.openAuthModal = function(mode = "login") {
    authMode = mode;
    window._authMode = authMode;
    updateModalText();
    clearAuthError();
    document.getElementById("auth-email").value = "";
    document.getElementById("auth-password").value = "";
    document.getElementById("auth-modal-overlay").classList.add("open");
    setTimeout(() => document.getElementById("auth-email").focus(), 80);
  };

  window.closeAuthModal = function() {
    document.getElementById("auth-modal-overlay").classList.remove("open");
  };

  window.switchAuthMode = function() {
    authMode = authMode === "login" ? "signup" : "login";
    window._authMode = authMode;
    updateModalText();
    clearAuthError();
  };

  function updateModalText() {
    const t = window._currentTranslation || TRANSLATIONS["en"];
    const title = document.getElementById("auth-modal-title");
    const sub = document.getElementById("auth-modal-sub");
    const btn = document.getElementById("auth-submit-btn");
    const toggle = document.getElementById("auth-toggle-text");
    if (authMode === "login") {
      title.textContent = t.modalWelcome;
      sub.textContent = t.modalSub;
      btn.textContent = t.modalSignIn;
      toggle.innerHTML = `${t.modalNoAccount} <span onclick="switchAuthMode()">${t.modalSignUp}</span>`;
    } else {
      title.textContent = t.modalCreate;
      sub.textContent = t.modalCreateSub;
      btn.textContent = t.modalSignUp;
      toggle.innerHTML = `${t.modalHaveAccount} <span onclick="switchAuthMode()">${t.modalSignIn}</span>`;
    }
  }

  function showAuthError(msg) {
    const el = document.getElementById("auth-error");
    el.textContent = msg;
    el.style.display = "block";
  }

  function clearAuthError() {
    const el = document.getElementById("auth-error");
    el.style.display = "none";
    el.textContent = "";
  }

  function friendlyError(code) {
    const map = {
      "auth/invalid-email": "Please enter a valid email address.",
      "auth/user-not-found": "No account found with this email.",
      "auth/wrong-password": "Incorrect password. Please try again.",
      "auth/email-already-in-use": "This email is already registered. Try signing in.",
      "auth/weak-password": "Password must be at least 6 characters.",
      "auth/too-many-requests": "Too many attempts. Please wait a moment and try again.",
      "auth/popup-closed-by-user": "Google sign-in was cancelled.",
      "auth/network-request-failed": "Network error. Check your internet connection."
    };
    return map[code] || "Something went wrong. Please try again.";
  }

  window.handleAuthSubmit = async function() {
    clearAuthError();
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    const submitBtn = document.getElementById("auth-submit-btn");

    if (!email || !password) {
      showAuthError("Please fill in both email and password.");
      return;
    }

    submitBtn.disabled = true;
    const t = window._currentTranslation || TRANSLATIONS["en"];
    submitBtn.textContent = authMode === "login" ? (t.modalSignIn + "…") : (t.modalSignUp + "…");

    try {
      if (authMode === "signup") {
        await createUserWithEmailAndPassword(auth, email, password);
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
      window.closeAuthModal();
    } catch (err) {
      showAuthError(friendlyError(err.code));
    } finally {
      const t2 = window._currentTranslation || TRANSLATIONS["en"];
      submitBtn.disabled = false;
      submitBtn.textContent = authMode === "login" ? t2.modalSignIn : t2.modalSignUp;
    }
  };

  window.handleGoogleAuth = async function() {
    clearAuthError();
    try {
      await signInWithPopup(auth, googleProvider);
      window.closeAuthModal();
    } catch (err) {
      showAuthError(friendlyError(err.code));
    }
  };

  window.signOutUser = async function() {
    closeAuthDropdown();
    await signOut(auth);
  };

  // Close modal on overlay click
  document.getElementById("auth-modal-overlay").addEventListener("click", function(e) {
    if (e.target === this) window.closeAuthModal();
  });

  // Allow Enter key in password field
  document.getElementById("auth-password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") window.handleAuthSubmit();
  });

  // Toggle language section in dropdown
  window.toggleLangSection = function() {
    const opts = document.getElementById("lang-options");
    const arrow = document.getElementById("lang-section-arrow");
    const isOpen = opts.style.display !== "none";
    opts.style.display = isOpen ? "none" : "block";
    arrow.style.transform = isOpen ? "rotate(0deg)" : "rotate(180deg)";
  };
</script>
</body>
</html>
